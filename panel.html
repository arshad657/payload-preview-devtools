<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 10px;
      background-color: #202124;
      color: #e8eaed;
    }
    .request-container {
      border: 1px solid #3c4043;
      border-radius: 4px;
      margin-bottom: 15px;
      padding: 10px;
      background-color: #292a2d;
    }
    .url {
      font-weight: bold;
      color: #8ab4f8;
      word-break: break-all;
      margin-bottom: 8px;
    }
    .grid {
      display: flex;
      gap: 15px;
    }
    .box {
      flex: 1;
      min-width: 0;
    }
    h3 {
      margin: 5px 0;
      font-size: 13px;
      color: #9aa0a6;
      text-transform: uppercase;
    }
    pre {
      background-color: #1f2023;
      padding: 8px;
      border-radius: 4px;
      overflow-x: auto;
      font-family: monospace;
      font-size: 12px;
      border: 1px solid #35363a;
      margin: 0;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <h2>Captured Network Requests</h2>
  <div id="log"></div>

  <script src="panel.js"></script>
</body>
</html>
